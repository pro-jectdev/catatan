<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Finance Dashboard - Mobile Optimized</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

    <style>
        html { scroll-behavior: smooth; }
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top left, #dbeafe 0%, transparent 30%), #f8fafc;
        }
        .glass {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
        }
        .fade-in { animation: fade .25s ease-out; }
        @keyframes fade {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        #timeline::-webkit-scrollbar { width: 4px; }
        #timeline::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>

<body class="min-h-screen p-3 md:p-8 pb-10 text-slate-800">

    <div class="max-w-7xl mx-auto">

        <!-- HEADER SECTION -->
        <div class="grid lg:grid-cols-[1fr_320px] gap-4 md:gap-6 mb-6 items-stretch">
            <div class="glass rounded-[1.5rem] md:rounded-[2rem] p-5 md:p-8 shadow-xl border border-white/50">
                <p class="uppercase tracking-[0.2em] text-[10px] font-bold text-blue-600 mb-2">
                    FINANCE TRACKER
                </p>
                <h1 class="text-2xl md:text-5xl font-extrabold text-slate-900 leading-tight">
                    Dashboard <span class="text-blue-600">Keuangan</span>
                </h1>
            </div>

            <div class="bg-gradient-to-br from-blue-600 to-indigo-700 rounded-[1.5rem] md:rounded-[2rem] p-6 text-white shadow-lg flex flex-col justify-center">
                <p class="uppercase tracking-[0.2em] text-[10px] font-bold opacity-80 mb-2">Total Pengeluaran</p>
                <h2 id="totalPengeluaran" class="text-2xl md:text-4xl font-extrabold break-all">Rp 0</h2>
            </div>
        </div>

        <!-- SUMMARY CARDS -->
        <div class="mb-6 grid grid-cols-2 gap-3 md:gap-5">
            <div class="glass rounded-2xl md:rounded-3xl p-4 md:p-6 shadow border border-white/50">
                <p class="text-slate-400 text-[10px] md:text-sm mb-1 font-medium italic">Transaksi</p>
                <h3 id="jumlahTransaksi" class="text-xl md:text-3xl font-bold text-slate-900">0</h3>
            </div>
            <div class="glass rounded-2xl md:rounded-3xl p-4 md:p-6 shadow border border-white/50">
                <p class="text-slate-400 text-[10px] md:text-sm mb-1 font-medium italic">Rata-rata</p>
                <h3 id="rataPengeluaran" class="text-xl md:text-3xl font-bold text-slate-900 text-ellipsis overflow-hidden">Rp 0</h3>
            </div>
        </div>

        <!-- TIMELINE SECTION -->
        <div class="glass rounded-[1.5rem] md:rounded-[2rem] shadow-xl border border-white/50 overflow-hidden">
            <div class="p-4 md:p-6 border-b sticky top-0 bg-white/80 backdrop-blur-md z-10 flex items-center justify-between">
                <div>
                    <h2 class="text-base md:text-xl font-bold text-slate-900">Timeline</h2>
                    <p class="hidden md:block text-xs text-slate-400">Data Google Sheets</p>
                </div>

                <button id="refreshBtn" class="flex items-center gap-2 text-xs bg-blue-600 text-white px-3 py-2 md:px-5 md:py-2.5 rounded-lg md:rounded-xl hover:bg-blue-700 active:scale-95 transition-all">
                    <svg id="refreshIcon" class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                    <span>Refresh</span>
                </button>
            </div>

            <div id="timeline" class="p-3 md:p-6 space-y-3 max-h-[500px] overflow-y-auto">
                <!-- Konten via JS -->
            </div>
        </div>
    </div>

    <script>
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbz-GZfeckMrccMu9GeQo-b85EiFxBiJBGlY7hkuAKQ75AC2keL3I83wIltyBgm435sgwg/exec";

        const totalEl = document.getElementById('totalPengeluaran');
        const jumlahEl = document.getElementById('jumlahTransaksi');
        const rataEl = document.getElementById('rataPengeluaran');
        const timelineEl = document.getElementById('timeline');
        const refreshBtn = document.getElementById('refreshBtn');
        const refreshIcon = document.getElementById('refreshIcon');

        function formatRupiah(num) {
            return new Intl.NumberFormat('id-ID', {
                style: 'currency', currency: 'IDR', minimumFractionDigits: 0
            }).format(num || 0);
        }

        function formatTanggal(dateString) {
            if (!dateString || dateString === '-') return '-';
            try {
                const date = new Date(dateString);
                const options = { 
                    day: '2-digit', month: '2-digit', year: '2-digit',
                    hour: '2-digit', minute: '2-digit'
                };
                return new Intl.DateTimeFormat('id-ID', options).format(date);
            } catch (e) { return dateString; }
        }

        async function muatData() {
            try {
                refreshBtn.disabled = true;
                refreshIcon.classList.add('animate-spin');
                
                const response = await fetch(`${WEB_APP_URL}?action=read`);
                const data = await response.json();

                const total = data.reduce((acc, item) => acc + (Number(item.jumlah) || 0), 0);
                const avg = data.length ? total / data.length : 0;

                totalEl.textContent = formatRupiah(total);
                jumlahEl.textContent = data.length;
                rataEl.textContent = formatRupiah(avg);

                renderTimeline([...data].reverse(), avg);
            } catch (err) {
                timelineEl.innerHTML = `<p class="text-center text-red-500 text-xs py-10">Gagal memuat data</p>`;
            } finally {
                refreshBtn.disabled = false;
                refreshIcon.classList.remove('animate-spin');
            }
        }

        function renderTimeline(data, avg) {
            if (!data.length) {
                timelineEl.innerHTML = `<p class="text-center text-slate-400 py-10 text-xs">Kosong</p>`;
                return;
            }

            timelineEl.innerHTML = data.map(item => {
                const jumlah = Number(item.jumlah) || 0;
                const isHigh = jumlah > (avg * 1.5);
                
                return `
                    <div class="fade-in bg-white/60 border border-slate-100 rounded-xl p-3 md:p-4 shadow-sm">
                        <div class="flex justify-between items-center gap-2">
                            <div class="min-w-0 flex-1">
                                <p class="text-sm md:text-base font-bold text-slate-800 truncate leading-tight">
                                    ${item.deskripsi || 'Transaksi'}
                                </p>
                                <p class="text-[10px] md:text-xs text-slate-400 mt-1">
                                    ${formatTanggal(item.tanggal)}
                                </p>
                            </div>
                            <div class="text-right shrink-0 flex flex-col items-end gap-2">
                                <p class="text-sm md:text-lg font-black ${isHigh ? 'text-red-500' : 'text-blue-600'}">
                                    ${formatRupiah(jumlah)}
                                </p>
                                <button 
                                    class="hapus-btn px-2 py-1 border border-red-200 text-red-500 hover:bg-red-50 rounded-md text-[10px] font-bold transition-all active:scale-95" 
                                    data-id="${item.id}"
                                >
                                    Hapus
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        timelineEl.addEventListener('click', async (e) => {
            const btn = e.target.closest('.hapus-btn');
            if (!btn) return;
            const id = btn.dataset.id;
            if (confirm('Hapus transaksi ini?')) {
                const originalText = btn.innerText;
                btn.innerText = '...';
                btn.disabled = true;
                await fetch(`${WEB_APP_URL}?action=delete&id=${id}`);
                muatData();
            }
        });

        refreshBtn.addEventListener('click', muatData);
        window.onload = muatData;
    </script>
</body>
</html>
