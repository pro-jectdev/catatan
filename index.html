<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Finance Dashboard - Monitor</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

    <style>
        html { scroll-behavior: smooth; }

        body {
            font-family: 'Inter', sans-serif;
            background: #f8fafc;
        }

        .panel {
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 18px;
        }

        .soft-hover {
            transition: all .2s ease;
        }

        .soft-hover:hover {
            background: #f8fafc;
        }

        .fade-in {
            animation: fade .2s ease-out;
        }

        @keyframes fade {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }

        #timeline::-webkit-scrollbar {
            width: 6px;
        }

        #timeline::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }
    </style>
</head>

<body class="min-h-screen p-3 md:p-8 text-slate-800">

<div class="max-w-5xl mx-auto">

    <!-- HEADER (FORCED HORIZONTAL MOBILE SAFE) -->
    <div class="panel p-5 md:p-10 mb-6">

        <div class="flex items-center justify-between gap-4 flex-nowrap">

            <!-- LEFT -->
            <div class="min-w-0">
                <p class="text-[10px] md:text-xs uppercase tracking-[0.3em] text-slate-500 font-semibold whitespace-nowrap">
                    Finance Ledger
                </p>

                <h1 class="text-2xl md:text-5xl font-black mt-2 whitespace-nowrap">
                    Dashboard <span class="text-slate-900">Keuangan</span>
                </h1>
            </div>

            <!-- RIGHT -->
            <div class="shrink-0 text-right">
                <p class="text-xs text-slate-400 whitespace-nowrap">
                    Real-time
                </p>
            </div>

        </div>

    </div>

    <!-- SUMMARY -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">

        <div class="panel p-5 md:p-6">
            <p class="text-xs uppercase tracking-widest text-slate-400 font-semibold">
                Total Pengeluaran
            </p>
            <h2 id="totalPengeluaran" class="text-3xl md:text-4xl font-black mt-2">
                Rp 0
            </h2>
        </div>

        <div class="panel p-5 md:p-6">
            <p class="text-xs uppercase tracking-widest text-slate-400 font-semibold">
                Jumlah Transaksi
            </p>
            <h2 id="jumlahTransaksi" class="text-3xl md:text-4xl font-black mt-2">
                0
            </h2>
        </div>

    </div>

    <!-- LIST -->
    <div class="panel overflow-hidden">

        <!-- HEADER -->
        <div class="p-5 md:p-6 border-b flex items-center justify-between">

            <div>
                <h2 class="text-xl md:text-2xl font-black">
                    Riwayat Transaksi
                </h2>
                <p class="text-sm text-slate-400 mt-1">
                    Ledger aktivitas keuangan
                </p>
            </div>

            <button id="refreshBtn"
                class="text-sm px-4 py-2 rounded-lg bg-slate-900 text-white hover:bg-slate-800 transition flex items-center gap-2">

                <svg id="refreshIcon" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M4 4v5h5m11 11v-5h-5m5-6a8 8 0 00-13.657-5.657L4 9m16 6l-2.343 2.343A8 8 0 016 9" />
                </svg>

                Refresh
            </button>

        </div>

        <!-- TIMELINE -->
        <div id="timeline" class="divide-y divide-slate-100 max-h-[600px] overflow-y-auto"></div>

    </div>

</div>

<script>

    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwhMJbQktjIjvt_0HmA1VoSJVY-si7Oi2-Kg8GeTDDhyuwZD9xio8Ns7DaYS_VJLIiCgQ/exec";

    const totalEl = document.getElementById('totalPengeluaran');
    const jumlahEl = document.getElementById('jumlahTransaksi');
    const timelineEl = document.getElementById('timeline');
    const refreshBtn = document.getElementById('refreshBtn');
    const refreshIcon = document.getElementById('refreshIcon');

    function formatRupiah(num) {
        return new Intl.NumberFormat('id-ID', {
            style: 'currency',
            currency: 'IDR',
            minimumFractionDigits: 0
        }).format(num || 0);
    }

    async function muatData() {

        try {

            refreshBtn.disabled = true;
            refreshIcon.classList.add('animate-spin');

            const response = await fetch(`${WEB_APP_URL}?action=read`);
            const data = await response.json();

            if (data.error) throw new Error(data.error);

            const total = data.reduce((acc, item) =>
                acc + (parseFloat(item.jumlah) || 0), 0
            );

            totalEl.textContent = formatRupiah(total);
            jumlahEl.textContent = data.length;

            render([...data].reverse());

        } catch (err) {

            console.error(err);

            timelineEl.innerHTML = `
                <div class="p-10 text-center text-slate-400 text-sm">
                    Gagal memuat data
                </div>
            `;

        } finally {

            refreshBtn.disabled = false;
            refreshIcon.classList.remove('animate-spin');

        }
    }

    function render(data) {

        if (!data.length) {
            timelineEl.innerHTML = `
                <div class="p-10 text-center text-slate-400 text-sm">
                    Belum ada transaksi
                </div>
            `;
            return;
        }

        timelineEl.innerHTML = data.map(item => {

            const jumlah = parseFloat(item.jumlah) || 0;

            return `
                <div class="fade-in soft-hover flex items-center justify-between px-5 py-4 md:py-5">

                    <!-- LEFT -->
                    <div class="flex items-center gap-4 min-w-0">

                        <span class="text-[11px] font-mono text-slate-400 w-10">
                            ${item.id}
                        </span>

                        <div class="min-w-0">
                            <p class="font-semibold text-slate-900 truncate">
                                ${item.deskripsi || 'Transaksi'}
                            </p>
                            <p class="text-xs text-slate-400">
                                ${item.tanggal}
                            </p>
                        </div>

                    </div>

                    <!-- RIGHT -->
                    <div class="text-right shrink-0">
                        <p class="font-bold text-slate-900">
                            ${formatRupiah(jumlah)}
                        </p>
                    </div>

                </div>
            `;
        }).join('');
    }

    refreshBtn.addEventListener('click', muatData);
    window.onload = muatData;

</script>

</body>
</html>
