<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Finance Dashboard - Monitor</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

    <style>
        * {
            box-sizing: border-box;
        }
        html {
            scroll-behavior: smooth;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: #f8fafc;
            color: #1e293b;
        }
        .card-base {
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 24px;
        }
        .fade-in {
            animation: fade .25s ease-out forwards;
        }
        @keyframes fade {
            from {
                opacity: 0;
                transform: translateY(8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        #timeline {
            max-height: 620px;
            overflow-y: auto;
        }
        #timeline::-webkit-scrollbar {
            width: 6px;
        }
        #timeline::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 999px;
        }
    </style>
</head>

<body class="p-4 md:p-8 antialiased">

<div class="max-w-5xl mx-auto space-y-6">

    <div class="card-base p-8 md:p-12 shadow-xl bg-gradient-to-br from-white via-white to-indigo-50/50 relative overflow-hidden">
        <div class="absolute -right-10 -top-10 w-40 h-40 bg-indigo-100 rounded-full blur-3xl opacity-50"></div>
        <h1 class="text-3xl sm:text-4xl md:text-5xl font-extrabold text-slate-900 tracking-tight">
            Dashboard <span class="text-indigo-600 block sm:inline">Keuangan</span>
        </h1>
        <p class="text-sm md:text-base text-slate-500 mt-2 italic font-medium flex items-center gap-2">
            <span class="inline-block w-2 h-2 rounded-full bg-indigo-500"></span>
            "Beli yang butuh, bukan yang mau."
        </p>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">

        <div class="bg-gradient-to-br from-indigo-600 to-indigo-700 rounded-[24px] p-6 text-white shadow-lg shadow-indigo-100 transition-all hover:shadow-xl">
            <p class="text-xs uppercase tracking-widest opacity-75 font-bold">
                Total Pengeluaran
            </p>
            <h2 id="totalPengeluaran" class="text-3xl sm:text-4xl font-black mt-3 truncate">
                Rp 0
            </h2>
        </div>

        <div class="card-base p-6 shadow-sm hover:shadow-md transition-all">
            <p class="text-xs uppercase tracking-widest text-slate-400 font-bold">
                Jumlah Transaksi
            </p>
            <h2 id="jumlahTransaksi" class="text-3xl sm:text-4xl font-black mt-3 text-slate-800">
                0
            </h2>
        </div>

    </div>

    <div class="card-base overflow-hidden shadow-sm border border-slate-200">

        <div class="px-6 py-5 border-b border-slate-100 flex justify-between items-center bg-white">
            <div>
                <h2 class="font-bold text-slate-700 text-xs uppercase tracking-widest flex items-center gap-2">
                    <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
                    Riwayat Transaksi
                </h2>
            </div>

            <button
                id="refreshBtn"
                class="text-sm bg-indigo-50 hover:bg-indigo-100 active:scale-95 text-indigo-700 px-4 py-2 rounded-full font-bold transition-all flex items-center gap-2 disabled:opacity-50"
            >
                <svg id="refreshIcon" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
                        d="M4 4v5h5m11 11v-5h-5m5-6a8 8 0 00-13.657-5.657L4 9m16 6l-2.343 2.343A8 8 0 016 9" />
                </svg>
                <span>Refresh</span>
            </button>
        </div>

        <div id="timeline" class="p-5 space-y-3 bg-slate-50/50">
            <div class="text-center py-12 text-slate-400 font-medium italic text-sm flex flex-col items-center justify-center gap-3">
                <div class="w-8 h-8 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin"></div>
                Memuat data transaksi...
            </div>
        </div>

    </div>

</div>

<script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwhMJbQktjIjvt_0HmA1VoSJVY-si7Oi2-Kg8GeTDDhyuwZD9xio8Ns7DaYS_VJLIiCgQ/exec";

    const totalEl = document.getElementById('totalPengeluaran');
    const jumlahEl = document.getElementById('jumlahTransaksi');
    const timelineEl = document.getElementById('timeline');
    const refreshBtn = document.getElementById('refreshBtn');
    const refreshIcon = document.getElementById('refreshIcon');

    function formatRupiah(num) {
        return new Intl.NumberFormat('id-ID', {
            style: 'currency',
            currency: 'IDR',
            minimumFractionDigits: 0
        }).format(num || 0);
    }

    function formatTanggal(dateString) {
        if (!dateString) return '-';
        const date = new Date(dateString);
        // Cek jika tanggal valid, jika tidak valid kembalikan string aslinya
        if (isNaN(date.getTime())) return dateString; 
        
        return new Intl.DateTimeFormat('id-ID', {
            day: 'numeric',
            month: 'long',
            year: 'numeric',
            hour: '2-digit',
            minute: '2-digit'
        }).format(date) + ' WIB';
    }

    function getBadgeStyle(deskripsi) {
        const teks = (deskripsi || '').toLowerCase();
        if (teks.includes('makan') || teks.includes('minum') || teks.includes('kopi')) {
            return { bg: 'bg-orange-50 text-orange-600 border-orange-100', label: 'Kuliner' };
        }
        if (teks.includes('bensin') || teks.includes('ojek') || teks.includes('transport') || teks.includes('gofood')) {
            return { bg: 'bg-blue-50 text-blue-600 border-blue-100', label: 'Transportasi' };
        }
        if (teks.includes('listrik') || teks.includes('air') || teks.includes('wifi') || teks.includes('kos')) {
            return { bg: 'bg-purple-50 text-purple-600 border-purple-100', label: 'Tagihan' };
        }
        return { bg: 'bg-slate-50 text-slate-500 border-slate-200', label: 'Transaksi' };
    }

    async function muatData() {
        try {
            refreshBtn.disabled = true;
            refreshIcon.classList.add('animate-spin');

            const response = await fetch(`${WEB_APP_URL}?action=read`);
            if (!response.ok) throw new Error('Respon jaringan bermasalah');
            
            const data = await response.json();
            if (data.error) throw new Error(data.error);

            const total = data.reduce((acc, item) => acc + (parseFloat(item.jumlah) || 0), 0);

            totalEl.textContent = formatRupiah(total);
            jumlahEl.textContent = data.length;

            render([...data].reverse());

        } catch (err) {
            console.error(err);
            timelineEl.innerHTML = `
                <div class="text-center py-12 px-4 bg-white rounded-2xl border border-red-100">
                    <svg class="w-12 h-12 text-red-400 mx-auto mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
                    </svg>
                    <p class="text-red-600 font-bold text-base">Data Gagal Dimuat</p>
                    <p class="text-xs text-slate-400 mt-1 max-w-xs mx-auto">
                        Gagal terhubung dengan server atau URL Apps Script salah. Periksa koneksi Anda.
                    </p>
                </div>
            `;
        } finally {
            refreshBtn.disabled = false;
            refreshIcon.classList.remove('animate-spin');
        }
    }

    function render(data) {
        if (!data || !data.length) {
            timelineEl.innerHTML = `
                <div class="text-center py-12 bg-white rounded-2xl border border-dashed border-slate-200">
                    <svg class="w-12 h-12 text-slate-300 mx-auto mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4"/>
                    </svg>
                    <p class="text-slate-400 italic text-sm font-medium">Belum ada catatan transaksi.</p>
                </div>
            `;
            return;
        }

        timelineEl.innerHTML = data.map(item => {
            const jumlah = parseFloat(item.jumlah) || 0;
            const badge = getBadgeStyle(item.deskripsi);
            const tanggalDiformat = formatTanggal(item.tanggal);

            return `
                <div class="card-base p-4 sm:p-5 shadow-sm border border-slate-100 bg-white fade-in hover:border-indigo-100 transition-all">
                    <div class="flex justify-between items-start gap-4">
                        
                        <div class="min-w-0 space-y-2">
                            <div class="flex flex-wrap items-center gap-2">
                                <span class="text-[10px] px-2 py-0.5 rounded-md bg-slate-100 text-slate-600 font-bold border border-slate-200">
                                    #${item.id || '0'}
                                </span>
                                <span class="text-[10px] px-2 py-0.5 rounded-md border font-extrabold tracking-wide uppercase ${badge.bg}">
                                    ${badge.label}
                                </span>
                            </div>

                            <p class="text-sm sm:text-base font-semibold text-slate-800 break-words leading-snug">
                                ${item.deskripsi || 'Transaksi Tanpa Nama'}
                            </p>

                            <p class="text-xs text-slate-400 font-medium flex items-center gap-1">
                                <svg class="w-3.5 h-3.5 opacity-70" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                                </svg>
                                ${tanggalDiformat}
                            </p>
                        </div>

                        <div class="shrink-0 text-right">
                            <p class="text-indigo-600 font-extrabold text-base sm:text-lg tracking-tight">
                                ${formatRupiah(jumlah)}
                            </p>
                        </div>

                    </div>
                </div>
            `;
        }).join('');
    }

    refreshBtn.addEventListener('click', muatData);
    window.onload = muatData;
</script>

</body>
</html>
