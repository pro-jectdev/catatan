<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Finance Dashboard</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
        rel="stylesheet"
    />

    <style>
        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', sans-serif;
            background:
                radial-gradient(circle at top left, #dbeafe 0%, transparent 30%),
                radial-gradient(circle at bottom right, #ede9fe 0%, transparent 30%),
                #f8fafc;
        }

        .glass {
            background: rgba(255,255,255,0.75);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
        }

        .fade-in {
            animation: fade .25s ease;
        }

        @keyframes fade {
            from {
                opacity: 0;
                transform: translateY(6px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body class="min-h-screen p-4 md:p-8 text-slate-800">

    <div class="max-w-7xl mx-auto">

        <!-- HEADER -->
        <div class="grid lg:grid-cols-[1fr_320px] gap-6 mb-8 items-stretch">
            <div class="glass rounded-[2rem] p-6 md:p-8 shadow-xl border border-white/50 flex-1 overflow-hidden">
                <p class="uppercase tracking-[0.3em] text-xs font-bold text-blue-600 mb-4">
                    FINANCE TRACKER
                </p>

               <h1 class="text-[1.9rem] sm:text-4xl md:text-5xl font-extrabold text-slate-900 leading-tight break-words">
    Dashboard <span class="text-blue-600">Keuangan</span>
</h1>

                <p class="mt-5 text-slate-500 max-w-2xl">
                    Monitoring pengeluaran keluarga.
                </p>
            </div>

            <div class="bg-gradient-to-br from-blue-600 to-indigo-600 rounded-[2rem] p-8 text-white shadow-2xl min-w-[320px] flex flex-col justify-center">
                <p class="uppercase tracking-[0.3em] text-xs font-bold opacity-80 mb-4">
                    Total Pengeluaran
                </p>

                <h2
                    id="totalPengeluaran"
                    class="text-3xl sm:text-4xl md:text-5xl font-extrabold break-all leading-tight"
                >
                    Rp 0
                </h2>
            </div>
        </div>


        <!-- SUMMARY -->
        <div class="mb-8 grid md:grid-cols-2 gap-5">

            <div class="glass rounded-3xl p-6 shadow border border-white/50">
                <p class="text-slate-400 text-sm mb-2">
                    Jumlah Transaksi
                </p>

                <h3
                    id="jumlahTransaksi"
                    class="text-3xl md:text-4xl font-bold text-slate-900"
                >
                    0
                </h3>
            </div>

            <div class="glass rounded-3xl p-6 shadow border border-white/50">
                <p class="text-slate-400 text-sm mb-2">
                    Rata-rata Pengeluaran
                </p>

                <h3
                    id="rataPengeluaran"
                    class="text-3xl md:text-4xl font-bold text-slate-900"
                >
                    Rp 0
                </h3>
            </div>

        </div>


        <!-- TIMELINE -->
        <div class="glass rounded-[2rem] shadow-xl border border-white/50 overflow-hidden">

            <div class="p-6 border-b sticky top-0 bg-white/70 backdrop-blur-md z-10 flex items-center justify-between">
                <div>
                    <h2 class="text-xl font-bold">Timeline Transaksi</h2>
                    <p class="text-xs text-slate-400 mt-1">
                        Auto refresh setiap 30 detik
                    </p>
                </div>

                <button
                    id="refreshBtn"
                    class="text-xs bg-blue-500 text-white px-4 py-2 rounded-xl hover:bg-blue-600 transition"
                >
                    Refresh
                </button>
            </div>

            <div
                id="timeline"
                class="p-4 md:p-6 space-y-3 max-h-[520px] overflow-y-auto"
            ></div>

        </div>
    </div>


    <script>

        // GANTI DENGAN URL WEB APP ANDA
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbz-GZfeckMrccMu9GeQo-b85EiFxBiJBGlY7hkuAKQ75AC2keL3I83wIltyBgm435sgwg/exec";


        // ELEMENT
        const totalEl = document.getElementById('totalPengeluaran');
        const jumlahEl = document.getElementById('jumlahTransaksi');
        const rataEl = document.getElementById('rataPengeluaran');
        const timelineEl = document.getElementById('timeline');
        const refreshBtn = document.getElementById('refreshBtn');


        // FORMAT RUPIAH
        function formatRupiah(num) {
            return new Intl.NumberFormat('id-ID', {
                style: 'currency',
                currency: 'IDR',
                minimumFractionDigits: 0
            }).format(num || 0);
        }


        // LOADING
        function showLoading() {
            timelineEl.innerHTML = `
                <div class="text-center py-10 text-slate-400">
                    Memuat data...
                </div>
            `;
        }


        // ERROR
        function showError(message) {
            timelineEl.innerHTML = `
                <div class="text-center py-10 text-red-500">
                    ${message}
                </div>
            `;
        }


        // FETCH DATA
        async function muatData() {

            try {

                refreshBtn.disabled = true;
                refreshBtn.textContent = 'Loading...';

                showLoading();

                const response = await fetch(`${WEB_APP_URL}?action=read`);
                const data = await response.json();

                if (!Array.isArray(data)) {
                    throw new Error('Format data tidak valid');
                }


                // SUMMARY
                const total = data.reduce((acc, item) => {
                    return acc + (Number(item.jumlah) || 0);
                }, 0);

                const avg = data.length ? total / data.length : 0;

                totalEl.textContent = formatRupiah(total);
                jumlahEl.textContent = data.length;
                rataEl.textContent = formatRupiah(avg);


                // RENDER
                renderTimeline([...data].reverse(), avg);

            }
            catch (err) {
                console.error(err);
                showError('Gagal memuat data');
            }
            finally {
                refreshBtn.disabled = false;
                refreshBtn.textContent = 'Refresh';
            }
        }


        // RENDER TIMELINE
        function renderTimeline(data, avg) {

            if (!data.length) {
                timelineEl.innerHTML = `
                    <div class="text-center text-slate-400 py-10">
                        Belum ada transaksi
                    </div>
                `;
                return;
            }


            let html = '';

            data.forEach(item => {

                const jumlah = Number(item.jumlah) || 0;

                const isBig =
                    jumlah >= 100000 ||
                    jumlah >= (avg * 1.5);

                const badge = isBig
                    ? `<span class="text-[10px] bg-red-100 text-red-500 px-2 py-1 rounded-full ml-2">Besar</span>`
                    : '';


                html += `
                    <div class="fade-in bg-white/70 border border-slate-100 rounded-2xl p-4 shadow-sm hover:shadow-md transition">

                        <div class="flex items-start justify-between gap-3">

                            <div class="flex-1 min-w-0">
                                <p class="font-semibold text-slate-800 break-words">
                                    ${item.deskripsi || '-'}
                                    ${badge}
                                </p>

                                <p class="text-xs text-slate-400 mt-1">
                                    ${item.tanggal || '-'}
                                </p>
                            </div>

                            <div class="text-right font-bold ${isBig ? 'text-red-500' : 'text-blue-600'} flex flex-col items-end gap-2 shrink-0">

                                <span>
                                    ${formatRupiah(jumlah)}
                                </span>

                                <button
                                    class="hapus-btn text-[10px] text-slate-400 hover:text-red-500 transition"
                                    data-id="${item.id}"
                                >
                                    🗑 Hapus
                                </button>

                            </div>
                        </div>
                    </div>
                `;
            });

            timelineEl.innerHTML = html;
        }


        // DELETE
        async function hapusTransaksi(id) {

            const confirmDelete = confirm('Yakin mau hapus transaksi ini?');

            if (!confirmDelete) return;

            try {

                await fetch(
                    `${WEB_APP_URL}?action=delete&id=${id}`
                );

                muatData();

            }
            catch (err) {
                console.error(err);
                alert('Gagal menghapus transaksi');
            }
        }


        // EVENT DELETE
        timelineEl.addEventListener('click', (e) => {

            const btn = e.target.closest('.hapus-btn');

            if (!btn) return;

            const id = btn.dataset.id;

            if (id) {
                hapusTransaksi(id);
            }
        });


        // BUTTON REFRESH
        refreshBtn.addEventListener('click', muatData);


        // AUTO REFRESH
        setInterval(() => {
            muatData();
        }, 30000);


        // INITIAL LOAD
        window.onload = muatData;

    </script>

</body>
</html>
