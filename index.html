<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Finance Dashboard - Monitor</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
        rel="stylesheet"
    />

    <style>

        * {
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #f8fafc;
            color: #1e293b;
        }

        .card-base {
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 24px;
        }

        .fade-in {
            animation: fade .25s ease-out;
        }

        @keyframes fade {

            from {
                opacity: 0;
                transform: translateY(8px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        #timeline {
            max-height: 620px;
            overflow-y: auto;
        }

        #timeline::-webkit-scrollbar {
            width: 6px;
        }

        #timeline::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 999px;
        }

        .skeleton {
            position: relative;
            overflow: hidden;
            background: #e2e8f0;
        }

        .skeleton::after {
            content: '';
            position: absolute;
            inset: 0;
            transform: translateX(-100%);
            background: linear-gradient(
                90deg,
                transparent,
                rgba(255,255,255,.5),
                transparent
            );
            animation: shimmer 1.2s infinite;
        }

        @keyframes shimmer {
            100% {
                transform: translateX(100%);
            }
        }

    </style>
</head>

<body class="p-4 md:p-8">

<div class="max-w-5xl mx-auto space-y-6">

    <!-- HERO -->
    <div class="card-base p-8 md:p-14 shadow-xl bg-gradient-to-r from-white to-indigo-50">

        <h1 class="text-[28px] sm:text-[42px] md:text-6xl font-extrabold text-slate-900 leading-tight whitespace-nowrap">

            <span class="inline">
                Dashboard
            </span>

            <span class="inline text-indigo-600">
                Keuangan
            </span>

        </h1>

        <p class="text-base md:text-xl text-slate-500 mt-4 italic font-medium">
            Beli yang butuh, bukan yang mau.
        </p>

    </div>

    <!-- SUMMARY -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">

        <!-- TOTAL -->
        <div class="bg-indigo-600 rounded-[24px] p-6 text-white shadow-md">

            <p class="text-xs uppercase tracking-widest opacity-80 font-bold">
                Total Pengeluaran
            </p>

            <h2
                id="totalPengeluaran"
                class="text-4xl font-extrabold mt-3 text-white"
            >
                Rp 0
            </h2>

        </div>

        <!-- COUNT -->
        <div class="card-base p-6 shadow-sm">

            <p class="text-xs uppercase tracking-widest text-slate-400 font-bold">
                Jumlah Transaksi
            </p>

            <h2
                id="jumlahTransaksi"
                class="text-4xl font-extrabold mt-3"
            >
                0
            </h2>

        </div>

    </div>

    <!-- HISTORY -->
    <div class="card-base overflow-hidden shadow-sm">

        <!-- HEADER -->
        <div class="px-6 py-5 border-b border-slate-100 flex justify-between items-center bg-white">

            <div>

                <h2 class="font-bold text-slate-700 text-xs uppercase tracking-widest">
                    Riwayat Transaksi
                </h2>

            </div>

            <button
                id="refreshBtn"
                class="text-sm bg-indigo-100 hover:bg-indigo-200 text-indigo-700 px-4 py-2 rounded-full font-bold transition flex items-center gap-2"
            >

                <svg
                    id="refreshIcon"
                    class="w-4 h-4"
                    fill="none"
                    stroke="currentColor"
                    viewBox="0 0 24 24"
                >

                    <path
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        stroke-width="2"
                        d="M4 4v5h5m11 11v-5h-5m5-6a8 8 0 00-13.657-5.657L4 9m16 6l-2.343 2.343A8 8 0 016 9"
                    />

                </svg>

                Refresh

            </button>

        </div>

        <!-- TIMELINE -->
        <div
            id="timeline"
            class="p-5 space-y-4"
        >

            <!-- SKELETON -->
            <div class="space-y-4">

                <div class="card-base p-5">

                    <div class="skeleton h-4 w-20 rounded mb-4"></div>
                    <div class="skeleton h-5 w-48 rounded mb-3"></div>
                    <div class="skeleton h-3 w-32 rounded"></div>

                </div>

                <div class="card-base p-5">

                    <div class="skeleton h-4 w-16 rounded mb-4"></div>
                    <div class="skeleton h-5 w-40 rounded mb-3"></div>
                    <div class="skeleton h-3 w-28 rounded"></div>

                </div>

            </div>

        </div>

    </div>

</div>

<script>

    // =========================
    // CONFIG
    // =========================

    const WEB_APP_URL =
        "PASTE_WEBAPP_URL_DISINI";

    const API_KEY =
        "finance123";

    // =========================
    // ELEMENTS
    // =========================

    const totalEl =
        document.getElementById('totalPengeluaran');

    const jumlahEl =
        document.getElementById('jumlahTransaksi');

    const timelineEl =
        document.getElementById('timeline');

    const refreshBtn =
        document.getElementById('refreshBtn');

    const refreshIcon =
        document.getElementById('refreshIcon');

    // =========================
    // FORMAT RUPIAH
    // =========================

    function formatRupiah(num) {

        return new Intl.NumberFormat(
            'id-ID',
            {
                style: 'currency',
                currency: 'IDR',
                minimumFractionDigits: 0
            }
        ).format(num || 0);
    }

    // =========================
    // ESCAPE HTML
    // =========================

    function escapeHtml(text) {

        return String(text)

            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "&#039;");
    }

    // =========================
    // LOAD DATA
    // =========================

    async function muatData() {

        try {

            refreshBtn.disabled = true;

            refreshIcon.classList.add('animate-spin');

            const response = await fetch(

                `${WEB_APP_URL}?action=read&key=${API_KEY}`

            );

            const data = await response.json();

            if (data.error) {

                throw new Error(data.error);

            }

            const total = data.reduce(

                (acc, item) =>
                    acc + (parseFloat(item.jumlah) || 0),

                0
            );

            totalEl.textContent =
                formatRupiah(total);

            jumlahEl.textContent =
                data.length;

            render([...data].reverse());

        } catch (err) {

            console.error(err);

            timelineEl.innerHTML = `

                <div class="text-center py-10">

                    <p class="text-red-500 font-bold">
                        Data gagal dimuat
                    </p>

                    <p class="text-xs text-slate-400 mt-2">
                        ${escapeHtml(err.message)}
                    </p>

                </div>

            `;

        } finally {

            refreshBtn.disabled = false;

            refreshIcon.classList.remove('animate-spin');

        }
    }

    // =========================
    // RENDER DATA
    // =========================

    function render(data) {

        if (!data.length) {

            timelineEl.innerHTML = `

                <p class="text-center py-10 text-slate-400 italic">
                    Belum ada transaksi.
                </p>

            `;

            return;
        }

        timelineEl.innerHTML = data.map(item => {

            const jumlah =
                parseFloat(item.jumlah) || 0;

            return `

                <div class="card-base p-5 shadow-sm border border-slate-100 bg-white fade-in">

                    <div class="flex justify-between items-start gap-4">

                        <!-- LEFT -->
                        <div class="min-w-0">

                            <div class="flex items-center gap-3 mb-3">

                                <span class="text-[10px] px-2 py-1 rounded-full bg-slate-100 text-slate-500 font-bold">

                                    #${escapeHtml(item.id)}

                                </span>

                                <span class="text-[11px] uppercase tracking-widest text-slate-400 font-bold">

                                    Transaksi

                                </span>

                            </div>

                            <p class="text-sm md:text-base font-bold text-slate-800 break-words">

                                ${escapeHtml(item.deskripsi || 'Transaksi')}

                            </p>

                            <p class="text-xs text-slate-400 mt-2">

                                ${escapeHtml(item.tanggal)}

                            </p>

                        </div>

                        <!-- RIGHT -->
                        <div class="shrink-0 text-right">

                            <p class="text-indigo-700 font-black text-sm md:text-lg">

                                ${formatRupiah(jumlah)}

                            </p>

                        </div>

                    </div>

                </div>

            `;

        }).join('');
    }

    // =========================
    // EVENT
    // =========================

    refreshBtn.addEventListener(
        'click',
        muatData
    );

    // =========================
    // AUTO REFRESH
    // =========================

    setInterval(
        muatData,
        30000
    );

    // =========================
    // INIT
    // =========================

    window.onload = muatData;

</script>

</body>
</html>
